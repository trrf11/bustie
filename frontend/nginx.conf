# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=checkin:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=sse:10m;

# Umami analytics dashboard — LAN only
server {
    listen 80;
    server_name umami.*;

    # Resolve umami at request time so nginx starts even if umami is slow to boot
    resolver 127.0.0.11 valid=30s;

    # Allow private IP ranges only
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow 127.0.0.0/8;
    deny all;

    location / {
        set $umami_upstream http://umami:3000;
        proxy_pass $umami_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Main app
server {
    listen 80 default_server;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression — reduces JS bundle from ~442KB to ~135KB
    gzip on;
    gzip_types text/css application/javascript application/json text/plain;
    gzip_min_length 256;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SSE endpoint — long-lived connection, no buffering
    location /api/vehicles/stream {
        limit_conn sse 2;

        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # Check-in endpoint — stricter rate limit
    location /api/checkin {
        limit_req zone=checkin burst=5 nodelay;

        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy API requests to backend
    location /api/ {
        limit_req zone=api burst=10 nodelay;

        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Umami tracking script
    location = /umami/script.js {
        resolver 127.0.0.11 valid=30s;
        set $umami_script http://umami:3000/script.js;
        proxy_pass $umami_script;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Umami event collection endpoint
    location = /umami/api/send {
        resolver 127.0.0.11 valid=30s;
        set $umami_send http://umami:3000/api/send;
        proxy_pass $umami_send;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
